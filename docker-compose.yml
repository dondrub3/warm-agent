version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warm_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 主API服务
  api:
    build:
      context: .
      target: development  # 开发环境使用development，生产环境使用production
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/warm_agent
      REDIS_URL: redis://redis:6379/0
      API_KEY_SECRET: ${API_KEY_SECRET:-default_secret_key}
      ENVIRONMENT: development
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (异步任务)
  worker:
    build:
      context: .
      target: development
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/warm_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
    command: celery -A src.tasks.celery_app worker --loglevel=info

  # Celery Beat (定时任务)
  beat:
    build:
      context: .
      target: development
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/warm_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
    command: celery -A src.tasks.celery_app beat --loglevel=info

  # Prometheus (监控)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana (可视化)
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Nginx (反向代理，生产环境使用)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    restart: always

  # 测试服务
  test:
    build:
      context: .
      target: test
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/warm_agent_test
      REDIS_URL: redis://redis:6379/0
      TESTING: 1
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pytest tests/ -v --cov=src --cov-report=term-missing

  # 数据库迁移服务
  migrations:
    build:
      context: .
      target: development
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/warm_agent
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: